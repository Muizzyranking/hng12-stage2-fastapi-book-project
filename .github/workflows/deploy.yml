name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: Add EC2 host key to known_hosts
      run: |
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to EC2
      run: |
        ssh -i "~/.ssh/id_rsa" ubuntu@ec2-54-82-61-53.compute-1.amazonaws.com
        mkdir -p $HOME/projects
        PROJECT_DIR="$HOME/projects/hng12-stage2-fastapi-book-project"

        if [ -d "$PROJECT_DIR" ]; then
          echo "Directory exists, pulling latest changes"
          cd "$PROJECT_DIR"
          git pull origin main
        else
          echo "Directory does not exist, cloning repository"
          cd "$HOME/projects"
          git clone https://github.com/Muizzyranking/hng12-stage2-fastapi-book-project.git
          cd "$PROJECT_DIR"
        fi

        if [ ! -d "venv" ]; then
          python3 -m venv venv
        fi

        git pull origin main

        source venv/bin/activate
        pip install -r requirements.txt

        sudo systemctl restart gunicorn
        sudo systemctl reload nginx
        EOF
